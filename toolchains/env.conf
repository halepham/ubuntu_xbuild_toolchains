# Enable colcon tab-completion
source /usr/share/colcon_argcomplete/hook/colcon-argcomplete.bash

# Tab-completion for cross-colcon-build (delegates to colcon build completion)
_cross_colcon_build_complete() {
    # Rewrite completion context: cross-colcon-build <args> â†’ colcon build <args>
    local saved_words=("${COMP_WORDS[@]}")
    local saved_cword=$COMP_CWORD
    local saved_line=$COMP_LINE
    local saved_point=$COMP_POINT

    COMP_WORDS=("colcon" "build" "${COMP_WORDS[@]:1}")
    COMP_CWORD=$((COMP_CWORD + 1))
    COMP_LINE="colcon build${COMP_LINE#"${saved_words[0]}"}"
    COMP_POINT=$((COMP_POINT + 12 - ${#saved_words[0]}))

    # Invoke colcon's argcomplete handler
    _python_argcomplete colcon

    # Restore original context
    COMP_WORDS=("${saved_words[@]}")
    COMP_CWORD=$saved_cword
    COMP_LINE=$saved_line
    COMP_POINT=$saved_point
}
complete -o default -o nospace -F _cross_colcon_build_complete cross-colcon-build
